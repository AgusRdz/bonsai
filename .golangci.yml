linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - gofmt
    - misspell
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true  # small CLI binary, not a library

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
