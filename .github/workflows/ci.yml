name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: go test ./... -v -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: go vet ./...
      # Pinned to match the dev image (Dockerfile) and scripts/pre-commit.sh
      # so CI, local make lint, and the pre-commit hook never disagree.
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
